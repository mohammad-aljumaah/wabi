<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wabi &mdash; email. redefined.</title>

    <link rel="stylesheet" href="styles/main.css">

</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <h1 class="display">wabi</h1>
        <p class="label">inbox — 12 unread</p>
    </aside>

    <main class="thread-list">
        <h2 class="heading-1">Inbox</h2>

        <article class="card">
            <h3 class="heading-2">Starred messages</h3>
            <p class="body">
                A letter arrived this morning. It was not addressed to anyone in particular.
            </p>
            <p class="caption">3 days ago · 2 attachments</p>
        </article>
    </main>

    <section class="reading-pane">
        <h2 class="heading-1">Message</h2>
    </section>
</div>
</body>
</html>
